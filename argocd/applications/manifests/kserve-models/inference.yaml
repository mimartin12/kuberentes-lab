apiVersion: "serving.kserve.io/v1beta1"
kind: "InferenceService"
metadata:
  name: "phi3"
  namespace: kserve-test
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  predictor:
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    runtimeClassName: nvidia
    volumes:
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
    model:
      modelFormat:
        name: huggingface
      args:
        - --model_name=phi3
        - --served-model-name=phi3
        - --max-model-len=8192
      volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      storageUri: "pvc://model-store-pvc/Phi-3-mini-4k-instruct"
      resources:
        limits:
          cpu: "4"
          memory: 7Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "1"
          memory: 6Gi
          nvidia.com/gpu: "1"